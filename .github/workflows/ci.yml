name: Finance Tracker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: finance-tracker-frontend/package-lock.json

      - name: Install dependencies
        working-directory: finance-tracker-frontend
        run: npm ci

      - name: Run Jest unit tests
        working-directory: finance-tracker-frontend
        run: npm run test -- --run

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: finance-tracker-frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup MySQL
        uses: shogo82148/actions-setup-mysql@v1
        with:
          mysql-version: '8.0'
          root-password: root

      - name: Create database
        run: |
          mysql -uroot -proot -e "CREATE DATABASE finance_tracker;"

      - name: Build Spring Boot backend
        working-directory: finance-tracker-backend
        run: mvn clean package -DskipTests

      - name: Start Spring Boot backend
        working-directory: finance-tracker-backend
        run: |
          java -jar target/*.jar &
          echo "Waiting for backend to start..."
          sleep 40

      - name: Verify backend is running
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused \
          http://localhost:8080/api/auth/register || true

      - name: Install frontend dependencies
        working-directory: finance-tracker-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: finance-tracker-frontend
        run: npx playwright install --with-deps chromium

      - name: Start frontend dev server
        working-directory: finance-tracker-frontend
        run: npm run dev &

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright E2E tests
        working-directory: finance-tracker-frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: finance-tracker-frontend/playwright-report/