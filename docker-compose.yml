version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: finance-tracker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance_tracker
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - finance-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./finance-tracker-backend
      dockerfile: Dockerfile
    container_name: finance-tracker-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/finance_tracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - finance-network

  frontend:
    build:
      context: ./finance-tracker-frontend
      dockerfile: Dockerfile
    container_name: finance-tracker-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finance-network

volumes:
  mysql-data:

networks:
  finance-network:
    driver: bridge